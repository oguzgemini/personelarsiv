  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- İKONLAR ---
    const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;

    const FolderOpen = ({ className, fill, fillOpacity }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} fillOpacity={fillOpacity} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>;
    const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
    const CalendarIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const ChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const Users = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ClipboardPaste = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M15 2H9a1 1 0 0 0-1 1v2c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V3c0-.6-.4-1-1-1Z"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><path d="M16 4h2a2 2 0 0 1 2 2v2"/><path d="m9 14 2 2 4-4"/></svg>;
    const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const Edit2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
    const X = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const Loader2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Moon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Filter = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
    const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const Timer = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>;
    const PieChart = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
    const BarChart = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>;

    // --- FİREBASE YAPILANDIRMASI ---
    const firebaseConfig = {
      apiKey: "AIzaSyChS01ucJZP8sJGXLhBJ7uaKe5woww26ds",
      authDomain: "personel-arsiv.firebaseapp.com",
      projectId: "personel-arsiv",
      storageBucket: "personel-arsiv.firebasestorage.app",
      messagingSenderId: "45022718212",
      appId: "1:45022718212:web:9a066be0d26c2297894851"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    const getPersonnelRef = () => db.collection('personnel');

    // --- YARDIMCI FONKSİYONLAR (GELİŞMİŞ TARİH İŞLEMLERİ) ---
    
    // Farklı formatlardaki tarihleri JS Date objesine çeviren akıllı fonksiyon (Örn: 10.11.2023 veya 2023-11-10)
    const parseDateStr = (dateStr) => {
      if (!dateStr || typeof dateStr !== 'string' || dateStr.trim() === '-' || dateStr.trim() === '') return null;
      let str = dateStr.trim();
      const parts = str.split(/[\.\-\/]/);
      
      if (parts.length === 3) {
        let year, month, day;
        if (parts[0].length === 4) { // YYYY-MM-DD
          year = parseInt(parts[0]);
          month = parseInt(parts[1]) - 1;
          day = parseInt(parts[2]);
        } else { // DD.MM.YYYY veya DD/MM/YYYY
          day = parseInt(parts[0]);
          month = parseInt(parts[1]) - 1;
          year = parseInt(parts[2]);
        }
        const date = new Date(year, month, day);
        return isNaN(date.getTime()) ? null : date;
      }
      
      const fallback = new Date(str);
      return isNaN(fallback.getTime()) ? null : fallback;
    };

    const calculateDuration = (start, end) => {
      const s = parseDateStr(start);
      const e = parseDateStr(end);
      
      if (!s || !e) return '-';
      
      let diffDays = Math.floor((e - s) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return 'Hatalı Tarih';
      
      const years = Math.floor(diffDays / 365);
      diffDays %= 365;
      const months = Math.floor(diffDays / 30);
      const days = diffDays % 30;
      
      let res = [];
      if (years > 0) res.push(`${years} Yıl`);
      if (months > 0) res.push(`${months} Ay`);
      if (days > 0 || res.length === 0) res.push(`${days} Gün`);
      
      return res.join(' ');
    };

    const REASON_OPTIONS = ["Belirtilmedi", "Kendi İsteği", "İşveren Tarafından", "Emeklilik", "Diğer"];

    const getReasonBadge = (reason) => {
      switch(reason) {
        case "Kendi İsteği": return "bg-green-100 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800";
        case "İşveren Tarafından": return "bg-rose-100 text-rose-700 border-rose-200 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800";
        case "Emeklilik": return "bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800";
        default: return "bg-slate-100 text-slate-600 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700";
      }
    };

    // --- ANA UYGULAMA BİLEŞENİ ---
    function App() {
      const [data, setData] = useState([]);
      const [searchTerm, setSearchTerm] = useState("");
      const [filterYear, setFilterYear] = useState("Tümü");
      const [activeTab, setActiveTab] = useState("folders"); 
      const [selectedFolder, setSelectedFolder] = useState(null); 
      
      const [darkMode, setDarkMode] = useState(false);
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      const [newFolder, setNewFolder] = useState("");
      const [newNo, setNewNo] = useState("");
      const [newName, setNewName] = useState("");
      const [newStartDate, setNewStartDate] = useState("");
      const [newEndDate, setNewEndDate] = useState("");
      const [newReason, setNewReason] = useState("Belirtilmedi");

      const [bulkFolder, setBulkFolder] = useState("");
      const [bulkText, setBulkText] = useState("");

      const [editItem, setEditItem] = useState(null);
      const [modalConfig, setModalConfig] = useState(null);

      // Dark Mode Effect
      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        auth.signInAnonymously().catch(error => {
          console.error("Giriş hatası:", error);
          setModalConfig({ type: 'alert', title: 'Bağlantı Hatası', message: 'Sisteme güvenli giriş yapılamadı.' });
        });

        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        setIsLoading(true);
        
        const unsubscribe = getPersonnelRef().onSnapshot((snapshot) => {
          const items = [];
          snapshot.forEach((doc) => {
            items.push({ id: doc.id, ...doc.data() });
          });
          setData(items);
          setIsLoading(false);
        }, (error) => {
          console.error("Veri çekme hatası:", error);
          setIsLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // Yıl Seçeneklerini Veritabanından Okuma
      const availableYears = useMemo(() => {
        const years = new Set();
        data.forEach(d => {
          const eDate = parseDateStr(d.endDate);
          if (eDate) years.add(eDate.getFullYear().toString());
        });
        return ["Tümü", ...Array.from(years).sort().reverse()];
      }, [data]);

      // Arama ve Filtreleme
      const filteredData = useMemo(() => {
        return data.filter(item => {
          const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || item.folder.toString().includes(searchTerm.toLowerCase());
          
          const eDate = parseDateStr(item.endDate);
          const itemYear = eDate ? eDate.getFullYear().toString() : null;
          const matchYear = filterYear === "Tümü" || itemYear === filterYear;
          
          return matchSearch && matchYear;
        }).sort((a, b) => {
          if (a.folder !== b.folder) return b.folder - a.folder; 
          return a.no - b.no;
        });
      }, [data, searchTerm, filterYear]);

      const groupedFolders = useMemo(() => {
        const groups = {};
        filteredData.forEach(item => {
          if (!groups[item.folder]) groups[item.folder] = [];
          groups[item.folder].push(item);
        });
        return Object.entries(groups)
          .map(([folderNo, items]) => ({
            folderNo: parseInt(folderNo),
            items: items.sort((a, b) => a.no - b.no)
          }))
          .sort((a, b) => a.folderNo - b.folderNo);
      }, [filteredData]);

      // Yıllara Göre Gruplama (Raporlama İçin)
      const yearlyData = useMemo(() => {
        const groups = {};
        data.forEach(p => {
           const eDate = parseDateStr(p.endDate);
           const year = eDate ? eDate.getFullYear().toString() : "Belirsiz";
           if(!groups[year]) groups[year] = [];
           groups[year].push(p);
        });
        return Object.keys(groups).sort((a,b) => b.localeCompare(a)).map(year => ({
           year,
           count: groups[year].length,
           personnel: groups[year].sort((a, b) => a.name.localeCompare(b.name))
        }));
      }, [data]);

      // İstatistikler (Dashboard)
      const stats = useMemo(() => {
        const currentYear = new Date().getFullYear();
        
        let leftThisYear = 0;
        let totalDays = 0;
        let validDurationCount = 0;
        const reasonCounts = {};

        data.forEach(d => {
          // Bu Yıl Ayrılanlar
          const eDate = parseDateStr(d.endDate);
          if (eDate && eDate.getFullYear() === currentYear) leftThisYear++;
          
          // Ortalama Süre Hesaplama
          const sDate = parseDateStr(d.startDate);
          if (sDate && eDate) {
             const diff = Math.floor((eDate - sDate) / (1000 * 60 * 60 * 24));
             if (diff >= 0) {
               totalDays += diff;
               validDurationCount++;
             }
          }

          // En Sık Neden Hesaplama
          if (d.reason && d.reason !== "Belirtilmedi") {
            reasonCounts[d.reason] = (reasonCounts[d.reason] || 0) + 1;
          }
        });
        
        let maxFolderStr = "-";
        if (data.length > 0) {
           const counts = {};
           data.forEach(d => counts[d.folder] = (counts[d.folder] || 0) + 1);
           const maxF = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
           maxFolderStr = `D-${maxF} (${counts[maxF]} Kişi)`;
        }

        // Ortalama Süre Metni
        let avgDurationStr = "-";
        if (validDurationCount > 0) {
          const avgDays = Math.floor(totalDays / validDurationCount);
          const y = Math.floor(avgDays / 365);
          const m = Math.floor((avgDays % 365) / 30);
          let res = [];
          if (y > 0) res.push(`${y} Yıl`);
          if (m > 0) res.push(`${m} Ay`);
          if (res.length === 0) res.push(`${avgDays} Gün`);
          avgDurationStr = res.join(' ');
        }

        // En Sık Neden Metni
        let commonReasonStr = "-";
        const reasonsArr = Object.keys(reasonCounts);
        if (reasonsArr.length > 0) {
          commonReasonStr = reasonsArr.reduce((a, b) => reasonCounts[a] > reasonCounts[b] ? a : b);
        }

        return {
          total: data.length,
          folders: new Set(data.map(d => d.folder)).size,
          thisYear: leftThisYear,
          maxFolder: maxFolderStr,
          avgDuration: avgDurationStr,
          commonReason: commonReasonStr
        };
      }, [data]);

      const suggestNextValues = () => {
        if (data.length === 0) return { folder: 1, no: 1 };
        const maxFolder = Math.max(...data.map(item => item.folder));
        const itemsInMaxFolder = data.filter(item => item.folder === maxFolder);
        const maxNo = itemsInMaxFolder.length > 0 ? Math.max(...itemsInMaxFolder.map(item => item.no)) : 0;
        if (maxNo >= 10) return { folder: maxFolder + 1, no: 1 };
        return { folder: maxFolder, no: maxNo + 1 };
      };

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setSelectedFolder(null); 
        if (tab === "add") {
          const suggestions = suggestNextValues();
          setNewFolder(suggestions.folder);
          setNewNo(suggestions.no);
          setNewReason("Belirtilmedi");
        }
      };

      const handleAddPerson = async (e) => {
        e.preventDefault();
        if (!newName || !newFolder || !newNo || !user) return;
        
        const newPerson = {
          folder: parseInt(newFolder),
          no: parseInt(newNo),
          name: newName.toUpperCase(),
          startDate: newStartDate || "-",
          endDate: newEndDate || "-",
          reason: newReason || "Belirtilmedi"
        };

        try {
          await getPersonnelRef().add(newPerson);
          setNewName(""); setNewStartDate(""); setNewEndDate(""); setNewReason("Belirtilmedi");
          setActiveTab("folders");
          setSelectedFolder(parseInt(newFolder));
        } catch (error) {
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Kayıt eklenemedi.' });
        }
      };

      const handleBulkImport = async () => {
        if (!bulkFolder) return setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Dosya numarasını belirtin.' });
        if (!bulkText.trim()) return setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Verileri kutuya yapıştırın.' });
        if (!user) return;

        const rows = bulkText.trim().split('\n');
        const newItems = [];
        
        rows.forEach(row => {
          const cols = row.split('\t');
          if (cols.length >= 2 && cols[0].trim() !== "") { 
            newItems.push({
              folder: Number(bulkFolder),
              no: Number(cols[0]) || 0,
              name: cols[1]?.trim()?.toUpperCase() || "BİLİNMEYEN",
              startDate: cols[2]?.trim() || "-",
              endDate: cols[3]?.trim() || "-",
              reason: "Belirtilmedi"
            });
          }
        });

        if (newItems.length > 0) {
          setIsLoading(true);
          try {
            const batch = db.batch();
            const ref = getPersonnelRef();
            newItems.forEach(item => {
              const docRef = ref.doc();
              batch.set(docRef, item);
            });
            await batch.commit();
            setBulkText("");
            setModalConfig({ type: 'alert', title: 'Başarılı', message: `${newItems.length} kayıt aktarıldı!` });
            setActiveTab('folders');
            setSelectedFolder(Number(bulkFolder));
          } catch (error) {
            setModalConfig({ type: 'alert', title: 'Hata', message: 'Aktarım başarısız oldu.' });
          } finally {
            setIsLoading(false);
          }
        } else {
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Kopyalanan veri anlaşılamadı.' });
        }
      };

      const handleDeleteFolder = (folderNo) => {
        setModalConfig({
          type: 'confirm',
          title: 'Klasörü Sil',
          message: `Dosya ${folderNo} ve içindeki tüm kayıtlar kalıcı silinecek. Emin misiniz?`,
          onConfirm: async () => {
            setIsLoading(true);
            try {
              const batch = db.batch();
              const itemsToDelete = data.filter(item => Number(item.folder) === Number(folderNo));
              itemsToDelete.forEach(item => {
                const docRef = getPersonnelRef().doc(item.id);
                batch.delete(docRef);
              });
              await batch.commit();
              setSelectedFolder(null);
            } catch (error) {
              setModalConfig({ type: 'alert', title: 'Hata', message: 'Klasör silinemedi.' });
            } finally {
              setIsLoading(false);
            }
          }
        });
      };

      const handleDeletePerson = (person) => {
        setModalConfig({
          type: 'confirm',
          title: 'Personeli Sil',
          message: `${person.name} kalıcı olarak silinecek. Emin misiniz?`,
          onConfirm: async () => {
            try { await getPersonnelRef().doc(person.id).delete(); } 
            catch (error) { setModalConfig({ type: 'alert', title: 'Hata', message: 'Silinemedi.' }); }
          }
        });
      };

      // DÜZENLEME (EDİT) KAYDETME
      const saveEdit = async () => {
        if (!editItem.name || !editItem.folder || !editItem.no) {
           setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Dosya No, Sıra No ve İsim boş bırakılamaz.' });
           return;
        }
        if(!user) {
           setModalConfig({ type: 'alert', title: 'Oturum Hatası', message: 'Kullanıcı bağlantısı kurulamadı.' });
           return;
        }
        
        try {
          await getPersonnelRef().doc(editItem.id).update({
            folder: Number(editItem.folder),
            no: Number(editItem.no),
            name: String(editItem.name).toUpperCase(),
            startDate: editItem.startDate || "-",
            endDate: editItem.endDate || "-",
            reason: editItem.reason || "Belirtilmedi"
          });
          setEditItem(null);
        } catch (error) {
          console.error("Düzenleme hatası:", error);
          setModalConfig({ type: 'alert', title: 'Hata', message: `Değişiklikler kaydedilemedi. (${error.message})` });
        }
      };

      const clearAllData = () => {
        setModalConfig({
          type: 'confirm',
          title: 'Tüm Kayıtları Sıfırla',
          message: 'DİKKAT: Arşivdeki tüm kayıtlar silinecek! Onaylıyor musunuz?',
          onConfirm: async () => {
            setIsLoading(true);
            try {
              const chunks = [];
              for (let i = 0; i < data.length; i += 500) chunks.push(data.slice(i, i + 500));
              for (const chunk of chunks) {
                const batch = db.batch();
                chunk.forEach(item => batch.delete(getPersonnelRef().doc(item.id)));
                await batch.commit();
              }
              setActiveTab("folders");
            } catch (error) {
              setModalConfig({ type: 'alert', title: 'Hata', message: 'Silinemedi.' });
            } finally {
              setIsLoading(false);
            }
          }
        });
      };

      const exportToCSV = () => {
        if (data.length === 0) return setModalConfig({ type: 'alert', title: 'Uyarı', message: 'Kayıt yok.' });
        const headers = ["Dosya No", "Sıra No", "Personel Adı Soyadı", "İşe Giriş", "İşten Ayrılış", "Ayrılış Nedeni", "Çalışma Süresi"];
        const csvContent = [
          headers.join(","),
          ...data.map(row => `${row.folder},${row.no},${row.name},${row.startDate},${row.endDate},${row.reason || 'Belirtilmedi'},${calculateDuration(row.startDate, row.endDate)}`)
        ].join("\n");

        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "Ayrilan_Personel_Arsivi.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const Dashboard = () => (
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 animate-in slide-in-from-top-4 duration-500">
          <div className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col justify-center">
            <div className="text-slate-400 dark:text-slate-500 mb-1"><Users className="h-5 w-5" /></div>
            <div className="text-xl font-black text-slate-800 dark:text-white">{stats.total}</div>
            <div className="text-[10px] font-bold text-slate-500 uppercase mt-1">Toplam Personel</div>
          </div>
          <div className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col justify-center">
            <div className="text-yellow-500 mb-1"><Folder className="h-5 w-5" /></div>
            <div className="text-xl font-black text-slate-800 dark:text-white">{stats.folders}</div>
            <div className="text-[10px] font-bold text-slate-500 uppercase mt-1">Fiziki Klasör</div>
          </div>
          <div 
            onClick={() => { setFilterYear(new Date().getFullYear().toString()); setActiveTab('search'); }}
            className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-blue-200 dark:border-blue-500/30 flex flex-col justify-center cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 transition-all hover:scale-105 group relative overflow-hidden"
            title="Tıklayarak listeyi filtreleyin"
          >
            <div className="absolute top-2 right-2 text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"><ArrowRight className="h-4 w-4" /></div>
            <div className="text-rose-500 mb-1 group-hover:scale-110 transition-transform"><CalendarIcon className="h-5 w-5" /></div>
            <div className="text-xl font-black text-slate-800 dark:text-white">{stats.thisYear}</div>
            <div className="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase mt-1">Bu Yıl Ayrılanlar</div>
          </div>
          <div className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col justify-center">
            <div className="text-indigo-500 mb-1"><FileText className="h-5 w-5" /></div>
            <div className="text-lg font-black text-slate-800 dark:text-white truncate" title={stats.maxFolder}>{stats.maxFolder}</div>
            <div className="text-[10px] font-bold text-slate-500 uppercase mt-1">En Kalabalık Dosya</div>
          </div>
          <div className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col justify-center">
            <div className="text-emerald-500 mb-1"><Timer className="h-5 w-5" /></div>
            <div className="text-lg font-black text-slate-800 dark:text-white truncate" title={stats.avgDuration}>{stats.avgDuration}</div>
            <div className="text-[10px] font-bold text-slate-500 uppercase mt-1">Ortalama Süre</div>
          </div>
          <div className="bg-white dark:bg-slate-800/80 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col justify-center">
            <div className="text-purple-500 mb-1"><PieChart className="h-5 w-5" /></div>
            <div className="text-sm font-black text-slate-800 dark:text-white truncate mt-1" title={stats.commonReason}>{stats.commonReason}</div>
            <div className="text-[10px] font-bold text-slate-500 uppercase mt-1">En Sık Neden</div>
          </div>
        </div>
      );

      const renderTable = (tableData) => (
        <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y divide-slate-100 dark:divide-slate-800">
              <thead className="bg-slate-50/80 dark:bg-slate-800/80 backdrop-blur-sm">
                <tr>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Konum</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Personel Adı Soyadı</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">İşe Giriş</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">İşten Ayrılış</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Süre & Neden</th>
                  <th scope="col" className="px-6 py-5 text-right text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">İşlemler</th>
                </tr>
              </thead>
              <tbody className="bg-white dark:bg-slate-900 divide-y divide-slate-50 dark:divide-slate-800/50">
                {tableData.length > 0 ? (
                  tableData.map((person) => (
                    <tr key={person.id} className="hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-all duration-200 group">
                      <td className="px-6 py-4 whitespace-nowrap">
                        <div className="flex items-center gap-2">
                          <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-blue-100/50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-semibold text-xs border border-blue-100 dark:border-blue-800">
                            <Folder className="h-3.5 w-3.5" /> D-{person.folder}
                          </span>
                          <span className="inline-flex items-center px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-medium text-xs border border-slate-200 dark:border-slate-700">
                            No: {person.no}
                          </span>
                        </div>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap font-bold text-slate-800 dark:text-slate-200">{person.name}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500 dark:text-slate-400">{person.startDate}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500 dark:text-slate-400">{person.endDate}</td>
                      <td className="px-6 py-4 whitespace-nowrap">
                        <div className="flex flex-col gap-1.5 items-start">
                          <span className="flex items-center gap-1 text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800 px-2 py-1 rounded-md border border-slate-100 dark:border-slate-700">
                            <Clock className="h-3 w-3" /> {calculateDuration(person.startDate, person.endDate)}
                          </span>
                          <span className={`px-2 py-0.5 rounded-md text-[10px] font-bold border uppercase tracking-wider ${getReasonBadge(person.reason || 'Belirtilmedi')}`}>
                            {person.reason || 'Belirtilmedi'}
                          </span>
                        </div>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-right">
                        <div className="flex items-center justify-end gap-2 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                          <button onClick={() => setEditItem({...person})} className="p-2 text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 dark:text-indigo-400 hover:bg-indigo-100 rounded-xl transition-all hover:scale-105" title="Düzenle">
                            <Edit2 className="h-4 w-4" />
                          </button>
                          <button onClick={() => handleDeletePerson(person)} className="p-2 text-rose-600 bg-rose-50 dark:bg-rose-900/30 dark:text-rose-400 hover:bg-rose-100 rounded-xl transition-all hover:scale-105" title="Sil">
                            <Trash2 className="h-4 w-4" />
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))
                ) : (
                  <tr>
                    <td colSpan="6" className="px-6 py-16 text-center text-slate-400 font-medium">Kayıt bulunamadı.</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );

      if (isLoading && data.length === 0) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/20 to-indigo-50/20 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 flex flex-col items-center justify-center">
            <div className="relative">
              <div className="absolute inset-0 bg-blue-500 blur-xl opacity-20 rounded-full animate-pulse"></div>
              <Loader2 className="h-14 w-14 text-blue-600 dark:text-blue-400 animate-spin relative z-10 mb-6" />
            </div>
            <h2 className="text-2xl font-bold text-slate-800 dark:text-white">Sisteme Bağlanılıyor...</h2>
          </div>
        );
      }

      return (
        <div className="max-w-7xl mx-auto space-y-6 min-h-screen">
          
          <header className="flex flex-col md:flex-row justify-between items-center bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] shadow-sm border border-white/50 dark:border-slate-800/50 mt-4 md:mt-8 mx-4 md:mx-0">
            <div className="flex items-center justify-between w-full md:w-auto mb-4 md:mb-0">
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                  <FolderOpen className="text-white h-6 w-6" />
                </div>
                <div>
                  <h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300">Personel Arşivi</h1>
                  <p className="text-slate-500 dark:text-slate-400 text-sm font-medium">İnsan Kaynakları Yönetim Sistemi</p>
                </div>
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className="md:hidden p-3 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-600 dark:text-yellow-400">
                {darkMode ? <Sun className="h-5 w-5" /> : <Moon className="h-5 w-5" />}
              </button>
            </div>
            
            <div className="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
              <div className="flex flex-wrap justify-center gap-2 bg-slate-200/50 dark:bg-slate-800/50 p-1.5 rounded-2xl border border-slate-200/50 dark:border-slate-700/50 backdrop-blur-sm w-full md:w-auto">
                <button onClick={() => handleTabChange('folders')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'folders' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-700/50'}`}><FolderOpen className="h-4 w-4" /> <span className="hidden lg:inline">Klasörler</span></button>
                <button onClick={() => handleTabChange('search')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'search' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-700/50'}`}><Search className="h-4 w-4" /> <span className="hidden lg:inline">Liste</span></button>
                <button onClick={() => handleTabChange('reports')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'reports' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-700/50'}`}><BarChart className="h-4 w-4" /> <span className="hidden lg:inline">Raporlar</span></button>
                <button onClick={() => handleTabChange('add')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'add' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-700 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-white/50 dark:hover:bg-slate-700/50'}`}><Plus className="h-4 w-4" /> <span className="hidden lg:inline">Ekle</span></button>
                <button onClick={() => handleTabChange('bulk')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'bulk' ? 'bg-indigo-600 shadow text-white' : 'text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30'}`}><ClipboardPaste className="h-4 w-4" /> <span className="hidden lg:inline">Aktar</span></button>
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className="hidden md:flex p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-slate-600 dark:text-yellow-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                {darkMode ? <Sun className="h-5 w-5" /> : <Moon className="h-5 w-5" />}
              </button>
            </div>
          </header>

          <main className="px-4 md:px-0">
            
            {/* Dashboard & Arama Barı Ortak */}
            {(activeTab === 'folders' || activeTab === 'search' || activeTab === 'reports') && data.length > 0 && (
              <div>
                <Dashboard />
                
                {activeTab !== 'reports' && (
                  <div className="mb-8 flex flex-col md:flex-row justify-between gap-4">
                    <div className="flex-1 flex gap-2">
                      <div className="relative flex-1 group">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Search className="h-5 w-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" />
                        </div>
                        <input type="text" className="block w-full pl-12 pr-4 py-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white dark:border-slate-700 rounded-3xl shadow-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-400 transition-all font-medium text-slate-700 dark:text-slate-200 placeholder-slate-400 outline-none" placeholder="İsim veya dosya no ile ara..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      </div>
                      
                      {/* Yıl Filtresi */}
                      <div className="relative w-32 md:w-40 shrink-0">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Filter className="h-4 w-4 text-slate-400" /></div>
                        <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="block w-full pl-9 pr-4 py-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-white dark:border-slate-700 rounded-3xl shadow-sm focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-slate-700 dark:text-slate-200 appearance-none cursor-pointer">
                          {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                        </select>
                      </div>
                    </div>
                    
                    <button onClick={exportToCSV} className="flex items-center justify-center gap-2 px-8 py-4 bg-slate-900 dark:bg-blue-600 text-white rounded-3xl hover:bg-slate-800 dark:hover:bg-blue-700 hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 font-bold shrink-0">
                      <Download className="h-5 w-5" /> Excel İndir
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* KLASÖRLER */}
            {activeTab === 'folders' && data.length > 0 && (
              <div className="animate-in fade-in duration-500">
                {!selectedFolder && (
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                    {groupedFolders.map((folderGroup) => (
                      <div key={folderGroup.folderNo} onClick={() => setSelectedFolder(folderGroup.folderNo)} className="cursor-pointer group flex flex-col items-center justify-center p-6 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-[2rem] transition-all duration-300 shadow-sm hover:shadow-xl hover:-translate-y-1.5">
                        <div className="relative w-20 h-20 mb-4 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/20 dark:to-indigo-900/20 flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                          <Folder className="h-10 w-10 text-blue-500 dark:text-blue-400 drop-shadow-sm" fill="currentColor" fillOpacity="0.2" />
                          <div className="absolute -bottom-2 -right-2 w-8 h-8 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center shadow-sm border border-slate-100 dark:border-slate-600 text-sm font-bold text-blue-700 dark:text-blue-300">{folderGroup.folderNo}</div>
                        </div>
                        <h3 className="font-bold text-slate-800 dark:text-slate-200">Dosya {folderGroup.folderNo}</h3>
                        <div className="mt-2 flex items-center gap-1.5 text-xs font-semibold text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded-full"><Users className="h-3.5 w-3.5" />{folderGroup.items.length} Kişi</div>
                      </div>
                    ))}
                  </div>
                )}
                {selectedFolder && (
                  <div>
                    <div className="mb-6 flex flex-col md:flex-row md:items-center justify-between bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 rounded-[2rem] shadow-sm gap-4">
                      <div className="flex items-center gap-4">
                        <button onClick={() => setSelectedFolder(null)} className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-50 dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 rounded-2xl transition-all text-sm font-bold"><ChevronLeft className="h-4 w-4" /> Geri Dön</button>
                        <div className="h-8 w-px bg-slate-200 dark:bg-slate-700 hidden md:block"></div>
                        <div className="flex items-center gap-3">
                          <div className="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-xl"><FolderOpen className="h-6 w-6 text-blue-600 dark:text-blue-400" fill="currentColor" fillOpacity="0.2" /></div>
                          <div>
                            <h2 className="text-lg font-black text-slate-800 dark:text-slate-100">Dosya {selectedFolder}</h2>
                            <p className="text-xs text-slate-500 dark:text-slate-400 font-semibold">{groupedFolders.find(f => f.folderNo === selectedFolder)?.items.length} Personel</p>
                          </div>
                        </div>
                      </div>
                      <button onClick={() => handleDeleteFolder(selectedFolder)} className="flex items-center justify-center gap-2 px-5 py-2.5 bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 hover:bg-rose-500 hover:text-white rounded-2xl transition-all text-sm font-bold shrink-0"><Trash2 className="h-4 w-4" /> Klasörü Sil</button>
                    </div>
                    {renderTable(groupedFolders.find(f => f.folderNo === selectedFolder)?.items || [])}
                  </div>
                )}
              </div>
            )}

            {/* LİSTE */}
            {activeTab === 'search' && data.length > 0 && (
              <div className="space-y-6 animate-in fade-in duration-500">
                {renderTable(filteredData)}
              </div>
            )}

            {/* RAPORLAR (YILLARA GÖRE KİMLER AYRILDI) */}
            {activeTab === 'reports' && data.length > 0 && (
              <div className="space-y-6 animate-in fade-in duration-500">
                <div className="flex items-center justify-between mb-6 px-2">
                  <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-3">
                    <div className="p-2 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-xl"><BarChart className="h-6 w-6" /></div>
                    Yıllara Göre Ayrılan Personeller
                  </h2>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {yearlyData.map(group => (
                    <div key={group.year} className="bg-white dark:bg-slate-800 rounded-[2rem] p-6 shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
                      <div className="flex justify-between items-center mb-4 border-b border-slate-100 dark:border-slate-700 pb-4">
                        <h3 className="text-xl font-black text-slate-800 dark:text-slate-100">{group.year === "Belirsiz" ? "Tarihi Olmayanlar" : `${group.year} Yılı`}</h3>
                        <span className="px-4 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded-full font-bold text-sm border border-blue-100 dark:border-blue-800/50">{group.count} Kişi</span>
                      </div>
                      <div className="max-h-72 overflow-y-auto pr-2 space-y-2">
                        {group.personnel.map(p => (
                          <div key={p.id} className="flex justify-between items-center p-3 hover:bg-slate-50 dark:hover:bg-slate-700/50 rounded-xl transition-colors border border-transparent hover:border-slate-100 dark:hover:border-slate-600">
                            <div className="flex flex-col truncate">
                              <span className="font-bold text-slate-700 dark:text-slate-200 truncate">{p.name}</span>
                              <span className="text-[10px] font-semibold text-slate-400 mt-0.5 flex items-center gap-1"><Folder className="h-3 w-3"/> D-{p.folder} | No:{p.no}</span>
                            </div>
                            <div className="flex flex-col items-end gap-1 shrink-0 ml-2">
                              <span className="text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-900 px-2 py-1 rounded-md">{p.endDate}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* EKLE FORMU */}
            {activeTab === 'add' && (
              <div className="max-w-3xl mx-auto">
                 <form onSubmit={handleAddPerson} className="bg-white dark:bg-slate-800 p-8 md:p-10 rounded-[2rem] shadow-xl shadow-slate-200/40 dark:shadow-none border border-slate-100 dark:border-slate-700 space-y-8">
                  <div className="flex items-center gap-4 border-b border-slate-100 dark:border-slate-700 pb-6">
                    <div className="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-2xl"><Plus className="h-6 w-6"/></div>
                    <div>
                      <h3 className="text-xl font-black text-slate-800 dark:text-white">Yeni Personel Ekle</h3>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Dosya (Klasör) No *</label>
                      <input type="number" required value={newFolder} onChange={(e) => setNewFolder(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-black text-blue-700 dark:text-blue-400 text-lg" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Sıra No *</label>
                      <input type="number" required value={newNo} onChange={(e) => setNewNo(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-black text-blue-700 dark:text-blue-400 text-lg" />
                    </div>
                    <div className="space-y-2 md:col-span-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Adı Soyadı *</label>
                      <input type="text" required placeholder="Örn: AHMET YILMAZ" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold uppercase dark:text-white" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase flex items-center gap-2"><CalendarIcon className="h-3.5 w-3.5" /> İşe Giriş</label>
                      <input type="text" placeholder="YYYY-MM-DD veya DD.MM.YYYY" value={newStartDate} onChange={(e) => setNewStartDate(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-medium dark:text-slate-300" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase flex items-center gap-2"><CalendarIcon className="h-3.5 w-3.5" /> İşten Ayrılış</label>
                      <input type="text" placeholder="YYYY-MM-DD veya DD.MM.YYYY" value={newEndDate} onChange={(e) => setNewEndDate(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-medium dark:text-slate-300" />
                    </div>
                    <div className="space-y-2 md:col-span-2">
                      <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Ayrılış Nedeni</label>
                      <select value={newReason} onChange={(e) => setNewReason(e.target.value)} className="w-full px-5 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700 dark:text-slate-200">
                        {REASON_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="pt-2 flex justify-end">
                    <button type="submit" className="flex items-center gap-2 px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl hover:shadow-lg font-bold transition-all hover:-translate-y-0.5"><Plus className="h-5 w-5" /> Arşive Kaydet</button>
                  </div>
                </form>
              </div>
            )}

            {/* TOPLU AKTARIM FORMU */}
            {activeTab === 'bulk' && (
              <div className="max-w-4xl mx-auto space-y-8">
                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 dark:from-indigo-900/30 dark:to-purple-900/30 border border-indigo-100 dark:border-indigo-800/50 rounded-[2rem] p-8 flex flex-col md:flex-row gap-6 shadow-sm">
                  <div className="p-4 bg-white dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400 rounded-2xl shrink-0"><ClipboardPaste className="h-8 w-8" /></div>
                  <div>
                    <h3 className="font-black text-xl text-indigo-900 dark:text-indigo-200 mb-2">Excel'den Hızlı Veri Aktarımı</h3>
                    <p className="text-indigo-700/80 dark:text-indigo-300 font-medium leading-relaxed">Hedef klasörü seçin, Excel'deki tablolarınızı kopyalayın ve aşağıdaki metin kutusuna yapıştırın.</p>
                  </div>
                </div>
                <div className="bg-white dark:bg-slate-800 p-8 rounded-[2rem] border border-slate-100 dark:border-slate-700 flex flex-col lg:flex-row gap-8 shadow-sm">
                  <div className="lg:w-1/3 space-y-3">
                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Hedef Dosya No *</label>
                    <input type="number" placeholder="Örn: 27" value={bulkFolder} onChange={(e) => setBulkFolder(e.target.value)} className="w-full px-6 py-5 bg-indigo-50/50 dark:bg-slate-900 border border-indigo-100 dark:border-slate-700 rounded-2xl outline-none font-black text-indigo-700 dark:text-indigo-400 text-2xl" />
                  </div>
                  <div className="lg:w-2/3 space-y-3">
                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Excel'den Yapıştırılacak Alan *</label>
                    <textarea rows="6" placeholder="Sıra, İsim, Giriş ve Çıkış Tarihi sütunlarını buraya yapıştırın..." value={bulkText} onChange={(e) => setBulkText(e.target.value)} className="w-full px-6 py-5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none font-mono text-sm font-medium whitespace-pre resize-none dark:text-slate-300" ></textarea>
                  </div>
                </div>
                <div className="flex flex-col-reverse md:flex-row justify-between items-center gap-4">
                  <button onClick={clearAllData} className="w-full md:w-auto px-6 py-4 text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-2xl font-bold"><Trash2 className="h-4 w-4 inline mr-2" /> Tüm Kayıtları Sıfırla</button>
                  <button onClick={handleBulkImport} disabled={isLoading} className={`w-full md:w-auto flex items-center justify-center gap-3 px-10 py-4 text-white rounded-2xl font-bold transition-all ${isLoading ? 'bg-indigo-300' : 'bg-gradient-to-r from-indigo-600 to-purple-600'}`}>
                    {isLoading ? <Loader2 className="h-5 w-5 animate-spin" /> : <ClipboardPaste className="h-5 w-5" />} Verileri Aktar ve Kaydet
                  </button>
                </div>
              </div>
            )}
          </main>
          
          <br/><br/>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
