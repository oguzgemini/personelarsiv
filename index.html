<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personel Arşiv Yönetim Sistemi</title>

  <!-- Tailwind CSS (Tasarım için) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React ve ReactDOM (Arayüz Kütüphanesi) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Tarayıcıda React kodunu okumak için) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase v8/Compat (Bulut Veritabanı için) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* Özel Scrollbar (Tasarım Bütünlüğü İçin) */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-200">
  
  <!-- React'in İçine Yükleneceği Kutu -->
  <div id="root"></div>

  <!-- React Uygulaması -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- İKON BİLEŞENLERİ (Lucide İkonlarının SVG Halleri) ---
    const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Folder = ({ className, fill, fillOpacity }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} fillOpacity={fillOpacity} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>;
    const FolderOpen = ({ className, fill, fillOpacity }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} fillOpacity={fillOpacity} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>;
    const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
    const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const ChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const Users = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ClipboardPaste = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M15 2H9a1 1 0 0 0-1 1v2c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V3c0-.6-.4-1-1-1Z"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><path d="M16 4h2a2 2 0 0 1 2 2v2"/><path d="m9 14 2 2 4-4"/></svg>;
    const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const Edit2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
    const X = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const Loader2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;


    // --- FİREBASE YAPILANDIRMASI ---
    const firebaseConfig = {
      apiKey: "AIzaSyChS01ucJZP8sJGXLhBJ7uaKe5woww26ds",
      authDomain: "personel-arsiv.firebaseapp.com",
      projectId: "personel-arsiv",
      storageBucket: "personel-arsiv.firebasestorage.app",
      messagingSenderId: "45022718212",
      appId: "1:45022718212:web:9a066be0d26c2297894851"
    };

    // Firebase'i Başlat
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Ana Veritabanı Yolu Fonksiyonu (ARTIK GLOBAL HAVUZA KAYDEDER)
    const getPersonnelRef = () => db.collection('personnel');

    // --- ANA UYGULAMA BİLEŞENİ ---
    function App() {
      const [data, setData] = useState([]);
      const [searchTerm, setSearchTerm] = useState("");
      const [activeTab, setActiveTab] = useState("folders"); 
      const [selectedFolder, setSelectedFolder] = useState(null); 

      // Firebase ve Yükleme Stateleri
      const [user, setUser] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      // Tekil Ekleme Formu
      const [newFolder, setNewFolder] = useState("");
      const [newNo, setNewNo] = useState("");
      const [newName, setNewName] = useState("");
      const [newStartDate, setNewStartDate] = useState("");
      const [newEndDate, setNewEndDate] = useState("");

      // Toplu Ekleme Formu
      const [bulkFolder, setBulkFolder] = useState("");
      const [bulkText, setBulkText] = useState("");

      // Düzenleme ve Modal Stateleri
      const [editItem, setEditItem] = useState(null);
      const [modalConfig, setModalConfig] = useState(null);

      // 1. Oturum Açma (Anonymous Auth)
      useEffect(() => {
        auth.signInAnonymously().catch(error => {
          console.error("Giriş hatası:", error);
          setModalConfig({ type: 'alert', title: 'Bağlantı Hatası', message: 'Sisteme güvenli giriş yapılamadı.' });
        });

        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
        });
        return () => unsubscribe();
      }, []);

      // 2. Verileri Getirme (Ortak/Global Havuzdan)
      useEffect(() => {
        if (!user) return;
        setIsLoading(true);
        
        const unsubscribe = getPersonnelRef().onSnapshot((snapshot) => {
          const items = [];
          snapshot.forEach((doc) => {
            items.push({ id: doc.id, ...doc.data() });
          });
          setData(items);
          setIsLoading(false);
        }, (error) => {
          console.error("Veri çekme hatası:", error);
          setIsLoading(false);
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Veriler çekilirken bir hata oluştu.' });
        });

        return () => unsubscribe();
      }, [user]);

      // Filtreleme ve Gruplama
      const filteredData = useMemo(() => {
        return data.filter(item => {
          const searchLower = searchTerm.toLowerCase();
          return (
            item.name.toLowerCase().includes(searchLower) ||
            item.folder.toString().includes(searchLower)
          );
        }).sort((a, b) => {
          if (a.folder !== b.folder) return b.folder - a.folder; 
          return a.no - b.no;
        });
      }, [data, searchTerm]);

      const groupedFolders = useMemo(() => {
        const groups = {};
        filteredData.forEach(item => {
          if (!groups[item.folder]) {
            groups[item.folder] = [];
          }
          groups[item.folder].push(item);
        });
        return Object.entries(groups)
          .map(([folderNo, items]) => ({
            folderNo: parseInt(folderNo),
            items: items.sort((a, b) => a.no - b.no)
          }))
          .sort((a, b) => a.folderNo - b.folderNo);
      }, [filteredData]);

      // Otomatik Numara Önerisi
      const suggestNextValues = () => {
        if (data.length === 0) return { folder: 1, no: 1 };
        const maxFolder = Math.max(...data.map(item => item.folder));
        const itemsInMaxFolder = data.filter(item => item.folder === maxFolder);
        const maxNo = itemsInMaxFolder.length > 0 ? Math.max(...itemsInMaxFolder.map(item => item.no)) : 0;
        if (maxNo >= 10) return { folder: maxFolder + 1, no: 1 };
        return { folder: maxFolder, no: maxNo + 1 };
      };

      const handleTabChange = (tab) => {
        setActiveTab(tab);
        setSelectedFolder(null); 
        if (tab === "add") {
          const suggestions = suggestNextValues();
          setNewFolder(suggestions.folder);
          setNewNo(suggestions.no);
        }
      };

      // --- VERİTABANI İŞLEMLERİ (Global Yola Göre Güncellendi) ---

      const handleAddPerson = async (e) => {
        e.preventDefault();
        if (!newName || !newFolder || !newNo || !user) return;
        
        const newPerson = {
          folder: parseInt(newFolder),
          no: parseInt(newNo),
          name: newName.toUpperCase(),
          startDate: newStartDate || "-",
          endDate: newEndDate || "-"
        };

        try {
          await getPersonnelRef().add(newPerson);
          setNewName(""); setNewStartDate(""); setNewEndDate("");
          setActiveTab("folders");
          setSelectedFolder(parseInt(newFolder));
        } catch (error) {
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Personel kaydedilirken bir hata oluştu.' });
        }
      };

      const handleBulkImport = async () => {
        if (!bulkFolder) return setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Lütfen Hedef Dosya Numarasını belirtin.' });
        if (!bulkText.trim()) return setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Lütfen verileri kutuya yapıştırın.' });
        if (!user) return;

        const rows = bulkText.trim().split('\n');
        const newItems = [];
        
        rows.forEach(row => {
          const cols = row.split('\t');
          if (cols.length >= 2 && cols[0].trim() !== "") { 
            newItems.push({
              folder: Number(bulkFolder),
              no: Number(cols[0]) || 0,
              name: cols[1]?.trim()?.toUpperCase() || "BİLİNMEYEN",
              startDate: cols[2]?.trim() || "-",
              endDate: cols[3]?.trim() || "-"
            });
          }
        });

        if (newItems.length > 0) {
          setIsLoading(true);
          try {
            const batch = db.batch();
            const ref = getPersonnelRef();
            
            newItems.forEach(item => {
              const docRef = ref.doc(); // Otomatik ID oluşturur
              batch.set(docRef, item);
            });

            await batch.commit();
            setBulkText("");
            setModalConfig({ type: 'alert', title: 'Başarılı', message: `${newItems.length} adet personel Dosya ${bulkFolder} içerisine eklendi!` });
            setActiveTab('folders');
            setSelectedFolder(Number(bulkFolder));
          } catch (error) {
            setModalConfig({ type: 'alert', title: 'Hata', message: 'Toplu veriler kaydedilemedi.' });
          } finally {
            setIsLoading(false);
          }
        } else {
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Veri yapısı okunamadı. Lütfen Excel\'den kopyaladığınıza emin olun.' });
        }
      };

      const handleDeleteFolder = (folderNo) => {
        setModalConfig({
          type: 'confirm',
          title: 'Klasörü Sil',
          message: `Dosya ${folderNo} ve içindeki tüm kayıtlar silinecek. Emin misiniz?`,
          onConfirm: async () => {
            if(!user) return;
            setIsLoading(true);
            try {
              const batch = db.batch();
              const itemsToDelete = data.filter(item => Number(item.folder) === Number(folderNo));
              itemsToDelete.forEach(item => {
                const docRef = getPersonnelRef().doc(item.id);
                batch.delete(docRef);
              });
              await batch.commit();
              setSelectedFolder(null);
            } catch (error) {
              setModalConfig({ type: 'alert', title: 'Hata', message: 'Klasör silinemedi.' });
            } finally {
              setIsLoading(false);
            }
          }
        });
      };

      const handleDeletePerson = (person) => {
        setModalConfig({
          type: 'confirm',
          title: 'Personeli Sil',
          message: `${person.name} kalıcı olarak silinecek. Emin misiniz?`,
          onConfirm: async () => {
            if(!user) return;
            try {
              await getPersonnelRef().doc(person.id).delete();
            } catch (error) {
              setModalConfig({ type: 'alert', title: 'Hata', message: 'Personel silinemedi.' });
            }
          }
        });
      };

      const saveEdit = async () => {
        if (!editItem.name || !editItem.folder || !editItem.no) {
          return setModalConfig({ type: 'alert', title: 'Eksik Bilgi', message: 'Dosya No, Sıra No ve İsim boş bırakılamaz.' });
        }
        if(!user) return;
        
        try {
          await getPersonnelRef().doc(editItem.id).update({
            folder: Number(editItem.folder),
            no: Number(editItem.no),
            name: editItem.name.toUpperCase(),
            startDate: editItem.startDate,
            endDate: editItem.endDate
          });
          setEditItem(null);
        } catch (error) {
          setModalConfig({ type: 'alert', title: 'Hata', message: 'Değişiklikler kaydedilemedi.' });
        }
      };

      const clearAllData = () => {
        setModalConfig({
          type: 'confirm',
          title: 'Tüm Kayıtları Sıfırla',
          message: 'TÜM KAYITLAR silinecek. Bu işlem geri alınamaz. Emin misiniz?',
          onConfirm: async () => {
            if(!user) return;
            setIsLoading(true);
            try {
              const chunks = [];
              for (let i = 0; i < data.length; i += 500) {
                chunks.push(data.slice(i, i + 500));
              }
              for (const chunk of chunks) {
                const batch = db.batch();
                chunk.forEach(item => {
                  const docRef = getPersonnelRef().doc(item.id);
                  batch.delete(docRef);
                });
                await batch.commit();
              }
              setActiveTab("folders");
            } catch (error) {
              setModalConfig({ type: 'alert', title: 'Hata', message: 'Kayıtlar silinemedi.' });
            } finally {
              setIsLoading(false);
            }
          }
        });
      };

      const exportToCSV = () => {
        if (data.length === 0) return setModalConfig({ type: 'alert', title: 'Uyarı', message: 'İndirilecek kayıt yok.' });
        const headers = ["Dosya No", "Sıra No", "Personel Adı Soyadı", "İşe Giriş Tarihi", "İşten Ayrılış Tarihi"];
        const csvContent = [
          headers.join(","),
          ...data.map(row => `${row.folder},${row.no},${row.name},${row.startDate},${row.endDate}`)
        ].join("\n");

        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "Ayrilan_Personel_Arsivi.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // --- ARAYÜZ (RENDER) ---
      const renderTable = (tableData) => (
        <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="overflow-x-auto">
            <table className="min-w-full divide-y divide-slate-100">
              <thead className="bg-slate-50/80 backdrop-blur-sm">
                <tr>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Konum</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Personel Adı Soyadı</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">İşe Giriş</th>
                  <th scope="col" className="px-6 py-5 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">İşten Ayrılış</th>
                  <th scope="col" className="px-6 py-5 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">İşlemler</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-slate-50">
                {tableData.length > 0 ? (
                  tableData.map((person) => (
                    <tr key={person.id} className="hover:bg-blue-50/50 transition-all duration-200 group">
                      <td className="px-6 py-4 whitespace-nowrap">
                        <div className="flex items-center gap-2">
                          <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-blue-100/50 text-blue-700 font-semibold text-xs border border-blue-100">
                            <Folder className="h-3.5 w-3.5" /> D-{person.folder}
                          </span>
                          <span className="inline-flex items-center px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 font-medium text-xs border border-slate-200">
                            No: {person.no}
                          </span>
                        </div>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap font-bold text-slate-800">{person.name}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500">{person.startDate}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500">{person.endDate}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-right">
                        <div className="flex items-center justify-end gap-2 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                          <button onClick={() => setEditItem({...person})} className="p-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-all hover:scale-105" title="Düzenle">
                            <Edit2 className="h-4 w-4" />
                          </button>
                          <button onClick={() => handleDeletePerson(person)} className="p-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-xl transition-all hover:scale-105" title="Sil">
                            <Trash2 className="h-4 w-4" />
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))
                ) : (
                  <tr>
                    <td colSpan="5" className="px-6 py-16 text-center text-slate-400 font-medium">Kayıt bulunamadı.</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );

      if (isLoading && data.length === 0) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/20 to-indigo-50/20 flex flex-col items-center justify-center">
            <div className="relative">
              <div className="absolute inset-0 bg-blue-500 blur-xl opacity-20 rounded-full animate-pulse"></div>
              <Loader2 className="h-14 w-14 text-blue-600 animate-spin relative z-10 mb-6" />
            </div>
            <h2 className="text-2xl font-bold text-slate-800">Sisteme Bağlanılıyor...</h2>
            <p className="text-slate-500 mt-2 font-medium">Verileriniz güvenle getiriliyor, lütfen bekleyin.</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-slate-100 text-slate-800 p-4 md:p-6 lg:p-8 font-sans selection:bg-blue-200">
          <div className="max-w-7xl mx-auto space-y-6">
            
            {/* ÜST MENÜ */}
            <header className="flex flex-col md:flex-row justify-between items-center bg-white/70 backdrop-blur-xl p-4 md:p-6 rounded-[2rem] shadow-sm border border-white/50">
              <div className="flex items-center gap-4 mb-4 md:mb-0">
                <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                  <FolderOpen className="text-white h-6 w-6" />
                </div>
                <div>
                  <h1 className="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700">Personel Arşivi</h1>
                  <p className="text-slate-500 text-sm font-medium">Dijital klasör yönetim sistemi</p>
                </div>
              </div>
              
              <div className="flex flex-wrap justify-center gap-2 bg-slate-200/50 p-1.5 rounded-2xl border border-slate-200/50 backdrop-blur-sm">
                <button onClick={() => handleTabChange('folders')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'folders' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><FolderOpen className="h-4 w-4" /> <span className="hidden sm:inline">Klasörler</span></button>
                <button onClick={() => handleTabChange('search')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'search' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><Search className="h-4 w-4" /> <span className="hidden sm:inline">Tüm Liste</span></button>
                <button onClick={() => handleTabChange('add')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'add' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><Plus className="h-4 w-4" /> <span className="hidden sm:inline">Tek Ekle</span></button>
                <button onClick={() => handleTabChange('bulk')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${activeTab === 'bulk' ? 'bg-indigo-600 shadow text-white' : 'text-indigo-600 hover:bg-indigo-50'}`}><ClipboardPaste className="h-4 w-4" /> <span className="hidden sm:inline">Excel'den Aktar</span></button>
              </div>
            </header>

            {/* ANA İÇERİK */}
            <main className="relative">
              
              {/* Ortak Arama Barı */}
              {(activeTab === 'folders' || activeTab === 'search') && data.length > 0 && (
                <div className="mb-8 flex flex-col md:flex-row justify-between gap-4">
                  <div className="relative flex-1 group">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <Search className="h-5 w-5 text-slate-400 group-focus-within:text-blue-500 transition-colors" />
                    </div>
                    <input type="text" className="block w-full pl-12 pr-4 py-4 bg-white/80 backdrop-blur-md border border-white rounded-3xl shadow-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-400 transition-all font-medium text-slate-700 placeholder-slate-400 outline-none" placeholder="Kişi adı veya Dosya no ile hızlı arama yapın..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                  </div>
                  <button onClick={exportToCSV} className="flex items-center justify-center gap-2 px-8 py-4 bg-slate-900 text-white rounded-3xl hover:bg-slate-800 hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 font-bold shrink-0">
                    <Download className="h-5 w-5" /> Excel İndir
                  </button>
                </div>
              )}

              {/* Boş Ekran Karşılama */}
              {data.length === 0 && activeTab === 'folders' && !isLoading && (
                <div className="text-center py-20 bg-white/50 backdrop-blur-xl rounded-[3rem] border border-white shadow-xl shadow-slate-200/50">
                  <div className="relative inline-flex items-center justify-center mb-8">
                    <div className="absolute inset-0 bg-indigo-500 blur-2xl opacity-20 rounded-full"></div>
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-2xl relative z-10 rotate-3 hover:rotate-0 transition-transform duration-300">
                      <FolderOpen className="h-12 w-12 text-white" />
                    </div>
                  </div>
                  <h3 className="text-3xl font-black text-slate-800 mb-4">Dijital Arşiviniz Hazır!</h3>
                  <p className="text-slate-500 max-w-lg mx-auto mb-10 text-lg font-medium leading-relaxed">
                    Şu an sistem tamamen temiz. Fiziki dosyalarınızı saniyeler içinde buluta taşımak için toplu veri aktarımını kullanın.
                  </p>
                  <button onClick={() => handleTabChange('bulk')} className="inline-flex items-center gap-3 px-10 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-full hover:shadow-2xl hover:shadow-indigo-500/40 hover:-translate-y-1 font-bold text-lg transition-all duration-300 group">
                    Verileri Aktarmaya Başla <ArrowRight className="h-6 w-6 group-hover:translate-x-1 transition-transform" />
                  </button>
                </div>
              )}

              {/* KLASÖRLER EKRANI */}
              {activeTab === 'folders' && data.length > 0 && (
                <div>
                  {!selectedFolder && (
                    <div>
                      <div className="mb-6 flex justify-between items-center px-2">
                        <h2 className="text-xl font-black text-slate-800">Klasörleriniz <span className="text-slate-400 font-medium text-base ml-2">({groupedFolders.length} Toplam)</span></h2>
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                        {groupedFolders.map((folderGroup) => (
                          <div key={folderGroup.folderNo} onClick={() => setSelectedFolder(folderGroup.folderNo)} className="cursor-pointer group flex flex-col items-center justify-center p-6 bg-white border border-slate-100 rounded-[2rem] transition-all duration-300 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] hover:shadow-[0_8px_30px_-4px_rgba(6,81,237,0.15)] hover:-translate-y-1.5">
                            <div className="relative w-20 h-20 mb-4 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                              <Folder className="h-10 w-10 text-blue-500 drop-shadow-sm" fill="currentColor" fillOpacity="0.2" />
                              <div className="absolute -bottom-2 -right-2 w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100 text-sm font-bold text-blue-700">{folderGroup.folderNo}</div>
                            </div>
                            <h3 className="font-bold text-slate-800">Dosya {folderGroup.folderNo}</h3>
                            <div className="mt-2 flex items-center gap-1.5 text-xs font-semibold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100 group-hover:border-blue-100 group-hover:text-blue-600 transition-colors"><Users className="h-3.5 w-3.5" />{folderGroup.items.length} Kişi</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {selectedFolder && (
                    <div>
                      <div className="mb-6 flex flex-col md:flex-row md:items-center justify-between bg-white border border-slate-100 p-4 rounded-[2rem] shadow-sm gap-4">
                        <div className="flex items-center gap-4">
                          <button onClick={() => setSelectedFolder(null)} className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-50 text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-2xl transition-all text-sm font-bold"><ChevronLeft className="h-4 w-4" /> Geri Dön</button>
                          <div className="h-8 w-px bg-slate-200 hidden md:block"></div>
                          <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 rounded-xl"><FolderOpen className="h-6 w-6 text-blue-600" fill="currentColor" fillOpacity="0.2" /></div>
                            <div>
                              <h2 className="text-lg font-black text-slate-800">Dosya {selectedFolder}</h2>
                              <p className="text-xs text-slate-500 font-semibold">{groupedFolders.find(f => f.folderNo === selectedFolder)?.items.length} Personel</p>
                            </div>
                          </div>
                        </div>
                        <button onClick={() => handleDeleteFolder(selectedFolder)} className="flex items-center justify-center gap-2 px-5 py-2.5 bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white rounded-2xl transition-all text-sm font-bold shrink-0"><Trash2 className="h-4 w-4" /> Klasörü Sil</button>
                      </div>
                      {renderTable(groupedFolders.find(f => f.folderNo === selectedFolder)?.items || [])}
                    </div>
                  )}
                </div>
              )}

              {/* LİSTE EKRANI */}
              {activeTab === 'search' && data.length > 0 && (
                <div className="space-y-6">
                  {renderTable(filteredData)}
                  <div className="text-sm font-medium text-slate-500 text-right px-2">Toplam <span className="font-black text-slate-800">{filteredData.length}</span> kayıt.</div>
                </div>
              )}

              {/* EKLE EKRANI */}
              {activeTab === 'add' && (
                <div className="max-w-2xl mx-auto">
                   <form onSubmit={handleAddPerson} className="bg-white p-8 md:p-10 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 space-y-8">
                    <div className="flex items-center gap-4 border-b border-slate-100 pb-6">
                      <div className="p-3 bg-blue-50 text-blue-600 rounded-2xl"><Plus className="h-6 w-6"/></div>
                      <div>
                        <h3 className="text-xl font-black text-slate-800">Yeni Personel Ekle</h3>
                        <p className="text-sm font-medium text-slate-500 mt-1">Sıradaki numarayı sistem otomatik verir.</p>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1">Dosya (Klasör) No *</label>
                        <input type="number" required value={newFolder} onChange={(e) => setNewFolder(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-black text-blue-700 text-lg transition-all" />
                      </div>
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1">Sıra No *</label>
                        <input type="number" required value={newNo} onChange={(e) => setNewNo(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-black text-blue-700 text-lg transition-all" />
                      </div>
                      <div className="space-y-2 md:col-span-2">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1">Personel Adı Soyadı *</label>
                        <input type="text" required placeholder="Örn: AHMET YILMAZ" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-bold uppercase transition-all" />
                      </div>
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2 pl-1"><Calendar className="h-3.5 w-3.5" /> İşe Giriş</label>
                        <input type="date" value={newStartDate} onChange={(e) => setNewStartDate(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-medium text-slate-600 transition-all" />
                      </div>
                      <div className="space-y-2">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2 pl-1"><Calendar className="h-3.5 w-3.5" /> İşten Ayrılış</label>
                        <input type="date" value={newEndDate} onChange={(e) => setNewEndDate(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none font-medium text-slate-600 transition-all" />
                      </div>
                    </div>
                    <div className="pt-2 flex justify-end">
                      <button type="submit" className="flex items-center gap-2 px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl hover:shadow-lg hover:shadow-blue-500/30 hover:-translate-y-0.5 font-bold transition-all duration-300"><Plus className="h-5 w-5" /> Arşive Kaydet</button>
                    </div>
                  </form>
                </div>
              )}

              {/* TOPLU AKTARIM EKRANI */}
              {activeTab === 'bulk' && (
                <div className="max-w-4xl mx-auto space-y-8">
                  <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-100 rounded-[2rem] p-8 md:p-10 flex flex-col md:flex-row gap-6 items-start shadow-sm">
                    <div className="p-4 bg-white rounded-2xl shadow-sm text-indigo-600 shrink-0"><ClipboardPaste className="h-8 w-8" /></div>
                    <div>
                      <h3 className="font-black text-xl text-indigo-900 mb-2">Excel'den Hızlı Veri Aktarımı</h3>
                      <p className="text-indigo-700/80 font-medium leading-relaxed">Hedef klasörü seçin, Excel'deki tablolarınızı kopyalayın ve sağdaki metin kutusuna yapıştırın.</p>
                    </div>
                  </div>
                  <div className="bg-white p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 flex flex-col lg:flex-row gap-8">
                    <div className="lg:w-1/3 space-y-3">
                      <label className="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1">Hedef Dosya No *</label>
                      <input type="number" placeholder="Örn: 27" value={bulkFolder} onChange={(e) => setBulkFolder(e.target.value)} className="w-full px-6 py-5 bg-indigo-50/50 border border-indigo-100 rounded-2xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none font-black text-indigo-700 text-2xl transition-all placeholder-indigo-200" />
                    </div>
                    <div className="lg:w-2/3 space-y-3">
                      <label className="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1">Excel'den Yapıştırılacak Alan *</label>
                      <textarea rows="6" placeholder="Sıra, İsim, Giriş ve Çıkış Tarihi sütunlarını buraya yapıştırın..." value={bulkText} onChange={(e) => setBulkText(e.target.value)} className="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none font-mono text-sm font-medium leading-relaxed whitespace-pre resize-none transition-all" ></textarea>
                    </div>
                  </div>
                  <div className="flex flex-col-reverse md:flex-row justify-between items-center gap-4 pt-4">
                    <button onClick={clearAllData} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-4 text-rose-500 hover:bg-rose-50 rounded-2xl text-sm font-bold transition-colors"><Trash2 className="h-4 w-4" /> Tüm Kayıtları Sıfırla</button>
                    <button onClick={handleBulkImport} disabled={isLoading} className={`w-full md:w-auto flex items-center justify-center gap-3 px-10 py-4 text-white rounded-2xl font-bold shadow-lg transition-all duration-300 ${isLoading ? 'bg-indigo-300 cursor-not-allowed' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:shadow-indigo-500/40 hover:-translate-y-0.5'}`}>
                      {isLoading ? <Loader2 className="h-5 w-5 animate-spin" /> : <ClipboardPaste className="h-5 w-5" />} Verileri Aktar ve Kaydet
                    </button>
                  </div>
                </div>
              )}
            </main>
          </div>

          {/* DÜZENLEME (EDİT) PENCERESİ */}
          {editItem && (
            <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="bg-white/90 backdrop-blur-xl border border-white rounded-[2rem] shadow-2xl shadow-slate-900/10 w-full max-w-md overflow-hidden">
                <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                  <h3 className="font-black text-xl text-slate-800 flex items-center gap-3"><div className="p-2 bg-blue-100 rounded-lg text-blue-600"><Edit2 className="h-5 w-5" /></div>Kayıt Düzenle</h3>
                  <button onClick={() => setEditItem(null)} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors"><X className="h-5 w-5" /></button>
                </div>
                <div className="p-8 space-y-5">
                  <div className="grid grid-cols-2 gap-5">
                    <div className="space-y-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Dosya No</label>
                      <input type="number" value={editItem.folder} onChange={(e) => setEditItem({...editItem, folder: e.target.value})} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 font-bold" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Sıra No</label>
                      <input type="number" value={editItem.no} onChange={(e) => setEditItem({...editItem, no: e.target.value})} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 font-bold" />
                    </div>
                  </div>
                  <div className="space-y-2">
                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Personel Adı Soyadı</label>
                    <input type="text" value={editItem.name} onChange={(e) => setEditItem({...editItem, name: e.target.value})} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 uppercase font-bold text-slate-800" />
                  </div>
                  <div className="grid grid-cols-2 gap-5">
                    <div className="space-y-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">İşe Giriş</label>
                      <input type="text" value={editItem.startDate} onChange={(e) => setEditItem({...editItem, startDate: e.target.value})} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 font-medium" />
                    </div>
                    <div className="space-y-2">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">İşten Ayrılış</label>
                      <input type="text" value={editItem.endDate} onChange={(e) => setEditItem({...editItem, endDate: e.target.value})} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 font-medium" />
                    </div>
                  </div>
                </div>
                <div className="px-8 py-6 bg-slate-50/50 border-t border-slate-100 flex justify-end gap-3">
                  <button onClick={() => setEditItem(null)} className="px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-xl transition-colors">İptal</button>
                  <button onClick={saveEdit} className="px-8 py-3 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-500/20 rounded-xl transition-all hover:-translate-y-0.5">Değişiklikleri Kaydet</button>
                </div>
              </div>
            </div>
          )}

          {/* UYARI PENCERELERİ */}
          {modalConfig && (
            <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="bg-white/90 backdrop-blur-xl border border-white rounded-[2rem] shadow-2xl shadow-slate-900/10 w-full max-w-sm overflow-hidden">
                <div className="p-8 text-center">
                  <div className={`mx-auto w-16 h-16 flex items-center justify-center rounded-2xl mb-6 ${modalConfig.type === 'confirm' ? 'bg-rose-100 text-rose-500' : 'bg-blue-100 text-blue-500'}`}>
                    {modalConfig.type === 'confirm' ? <Trash2 className="h-8 w-8" /> : <FileText className="h-8 w-8" />}
                  </div>
                  <h3 className="font-black text-xl text-slate-800 mb-3">{modalConfig.title}</h3>
                  <p className="text-slate-500 font-medium whitespace-pre-wrap leading-relaxed">{modalConfig.message}</p>
                </div>
                <div className="px-8 py-5 bg-slate-50/50 border-t border-slate-100 flex flex-col-reverse sm:flex-row justify-center gap-3">
                  {modalConfig.type === 'confirm' && (
                    <button onClick={() => setModalConfig(null)} disabled={isLoading} className="w-full sm:w-auto px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-xl transition-colors">İptal Et</button>
                  )}
                  <button
                    disabled={isLoading}
                    onClick={async () => {
                      if (modalConfig.onConfirm) {
                        await modalConfig.onConfirm();
                      }
                      setModalConfig(null);
                    }}
                    className={`w-full sm:w-auto flex justify-center items-center gap-2 px-8 py-3 text-sm font-bold text-white shadow-md rounded-xl transition-all ${isLoading ? 'opacity-50 cursor-not-allowed' : 'hover:-translate-y-0.5'} ${modalConfig.type === 'confirm' ? 'bg-rose-600 hover:bg-rose-700 shadow-rose-500/20' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-500/20'}`}
                  >
                    {isLoading && <Loader2 className="h-4 w-4 animate-spin" />}
                    {modalConfig.type === 'confirm' ? 'Evet, Onaylıyorum' : 'Tamam'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
